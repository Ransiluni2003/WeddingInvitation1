<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #f6fbf4;
    --gold: #2e6417;
    --gold-light: #5a9b3c;
    --gold-dark: #1f4a10;
    --brown: #3a4a2a;
    --text: #1e2a1a;
    --accent: #c9a84c;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  html, body {
    height: 100%;
    -webkit-text-size-adjust: 100%;
    font-family: "Lato", sans-serif;
    background: #000;
    overflow: hidden;
    min-height: -webkit-fill-available;
  }
  body.invitation-open { overflow: hidden; background: var(--cream); }

  /* ===== VIDEO SCREEN ===== */
  #video-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    transition: opacity 1s ease, transform 1.2s ease;
  }
  #video-screen.hide { opacity: 0; transform: scale(1.06); pointer-events: none; }

  #bg-video {
    position: absolute; top:0; left:0;
    width: 100%; height: 100%;
    min-width: 100%; min-height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  .video-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.05) 35%,
      rgba(0,0,0,0.5) 70%,
      rgba(0,0,0,0.78) 100%);
    z-index: 1;
  }

  .video-title { position: absolute; top: 42%; left: 50%; transform: translate(-50%, -50%); z-index: 2; text-align: center; animation: fadeUp 1.4s ease 0.8s both; width: 90%; }

  .tap-btn-wrap { position: relative; z-index: 2; margin-bottom: calc(clamp(3rem, 8vw, 6rem) + var(--safe-bottom)); display: flex; flex-direction: column; align-items: center; gap: 1rem; animation: fadeUp 1.2s ease 1.6s both; }
  .tap-btn {
    position: relative;
    padding: 1.1rem 3.5rem;
    background: transparent; border: 1px solid rgba(232,204,128,0.7);
    color: #fff; font-family: "Cinzel", serif; font-size: clamp(0.75rem, 2vw, 0.95rem);
    letter-spacing: 0.35em; text-transform: uppercase; cursor: pointer; border-radius: 2px; overflow: hidden;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .tap-btn::before { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.4)); opacity: 0; transition: opacity 0.3s; }
  .tap-btn:hover::before, .tap-btn:active::before { opacity: 1; }
  .tap-ring { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(201,168,76,0.45); border-radius: 2px; animation: ringPulse 2.2s ease-out infinite; pointer-events: none; }
  .tap-ring:nth-child(2) { animation-delay: 0.7s; }
  .tap-ring:nth-child(3) { animation-delay: 1.4s; }
  .tap-hint { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: clamp(0.8rem, 1.8vw, 0.95rem); color: rgba(255,255,255,0.45); letter-spacing: 0.1em; }
  @keyframes ringPulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.65); opacity: 0; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== INVITATION PAGE ===== */
  #invitation {
    position: fixed; inset: 0;
    overflow-y: scroll; -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    z-index: 50;
    opacity: 0; pointer-events: none; transform: translateY(40px);
    transition: opacity 1s ease 0.2s, transform 1s ease 0.2s;
    background: var(--cream);
    padding-bottom: calc(var(--safe-bottom));
  }
  #invitation.show { opacity: 1; pointer-events: all; transform: translateY(0); }

  /* Corners */
  .corner { position: fixed; width: 60px; height: 60px; z-index: 100; pointer-events: none; }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 16px; left: 16px; }
  .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner.bl { bottom: calc(16px + var(--safe-bottom)); left: 16px; transform: scaleY(-1); }
  .corner.br { bottom: calc(16px + var(--safe-bottom)); right: 16px; transform: scale(-1); }

  /* Music button */
  #music-widget { position: fixed; bottom: calc(24px + var(--safe-bottom)); right: 24px; z-index: 101; display: flex; flex-direction: column; align-items: flex-end; gap: 0; }
  #musicBtn { position: relative; width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; background: linear-gradient(145deg, #2e6417, #1f4a10); display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  #musicBtn::before { content: ''; position: absolute; inset: 4px; border-radius: 50%; border: 1.5px solid transparent; border-top-color: rgba(201,168,76,0.9); border-right-color: rgba(201,168,76,0.4); animation: spinVinyl 2.4s linear infinite; opacity: 0; transition: opacity 0.4s; }
  #musicBtn.playing::before { opacity: 1; }
  @keyframes spinVinyl { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Responsive fixes */
  @media (max-width: 768px) {
    .inv-page { padding: 2rem 1.5rem 3rem; padding-bottom: calc(3rem + 100px + var(--safe-bottom)); }
    #musicBtn { width: 52px; height: 52px; }
  }
  @media (max-width: 480px) {
    .inv-page { padding: 1.8rem 1.1rem 2.6rem; padding-bottom: calc(2.6rem + 100px + var(--safe-bottom)); }
  }
</style>
</head>
<body>

<!-- ===== VIDEO SCREEN ===== -->
<div id="video-screen">
  <video id="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="0312.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
  <div class="tap-btn-wrap">
    <button class="tap-btn" id="tapBtn">
      <div class="tap-ring"></div>
      <div class="tap-ring"></div>
      <div class="tap-ring"></div>
      ✦ &nbsp;Tap to Open
    </button>
  </div>
</div>

<!-- ===== INVITATION PAGE ===== -->
<div id="invitation">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="inv-page">
    <div class="inv-content">
      <img class="inv-logo" src="logoCV-removebg-preview.png" alt="Logo">
      <p class="inv-tag">Together with their families</p>
      <p class="inv-together">invite you to celebrate the marriage of</p>
      <div class="inv-names">Chamith<span class="ampersand">&</span>Vihanga</div>
      <div class="ornament-line"><hr><span>✦</span><hr></div>
      <p class="inv-request">Together with joyful hearts,<br>we joyfully invite you to share in the beginning of our forever.</p>
      <div class="inv-date-block">
        <div class="inv-date">Thursday 07 May 2026</div>
      </div>
    </div>
  </div>
</div>

<script>
  const tapBtn = document.getElementById('tapBtn');
  const videoScreen = document.getElementById('video-screen');
  const invitation = document.getElementById('invitation');

  tapBtn.addEventListener('click', () => {
    videoScreen.classList.add('hide');
    invitation.classList.add('show');
  });
</script>

</body>
</html>
