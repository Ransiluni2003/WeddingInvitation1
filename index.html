<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wedding Invitation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
  html, body { height:100%; overflow-x:hidden; font-family: sans-serif; -webkit-text-size-adjust:100%; }
  body { background:#000; }

  /* ===== VIDEO SCREEN ===== */
  #video-screen {
    position: fixed; inset:0; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
    transition: opacity 1s ease, transform 1.2s ease;
  }
  #video-screen.hide { opacity:0; transform: scale(1.06); pointer-events:none; }

  #bg-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
  .video-overlay { position:absolute; inset:0; background:rgba(0,0,0,0.25); z-index:1; }

  .tap-btn-wrap { position: relative; z-index:2; margin-bottom: 4rem; display:flex; flex-direction:column; align-items:center; }
  .tap-btn { padding: 1rem 3rem; border:1px solid #fff; color:#fff; background:transparent; cursor:pointer; border-radius:2px; }

  /* ===== INVITATION ===== */
  #invitation {
    display:none;
    background:#f6fbf4;
    color:#1e2a1a;
    min-height:100%;
    overflow-y:auto;
    -webkit-overflow-scrolling: touch;
    padding:2rem;
  }

  .inv-page { max-width:900px; margin:0 auto 2rem; padding:2rem; display:flex; flex-direction:column; align-items:center; text-align:center; gap:1rem; }

  .inv-logo { width:150px; margin-bottom:1rem; }
  .inv-names { font-size:2rem; margin:1rem 0; }
  .inv-date { font-size:1.2rem; margin:1rem 0; }
  .rsvp-btn { padding:0.8rem 2rem; background:goldenrod; color:white; border:none; border-radius:2px; cursor:pointer; }

</style>
</head>
<body>

<!-- VIDEO SCREEN -->
<div id="video-screen">
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="0312.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
  <div class="tap-btn-wrap">
    <button class="tap-btn" id="tapBtn">Tap to Open</button>
  </div>
</div>

<!-- INVITATION -->
<div id="invitation">
  <div class="inv-page">
    <img class="inv-logo" src="logoCV-removebg-preview.png" alt="Logo">
    <p>Together with their families</p>
    <p>invite you to celebrate the marriage of</p>
    <div class="inv-names">Chamith & Vihanga</div>
    <p>Together with joyful hearts, we joyfully invite you to share in the beginning of our forever.</p>
    <div class="inv-date">Thursday 07 May 2026</div>
    <button class="rsvp-btn" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSd13_FD8OMV4lR2Pg3nxUk5WnogaZ_Jq45oASq60Ir6B_UrjA/viewform','_blank')">RSVP Now</button>
  </div>
  <div class="inv-page">
    <p>Second Page Content</p>
    <p>Scroll should work here on iPhone!</p>
  </div>
  <div class="inv-page">
    <p>Third Page Content</p>
    <p>Keep scrolling…</p>
  </div>
</div>

<script>
  const tapBtn = document.getElementById('tapBtn');
  const videoScreen = document.getElementById('video-screen');
  const invitation = document.getElementById('invitation');

  tapBtn.addEventListener('click', () => {
    videoScreen.classList.add('hide');
    invitation.style.display = 'block';
    
    // Fix iOS scroll
    invitation.style.height = window.innerHeight + 'px';
    invitation.style.overflowY = 'auto';
    invitation.scrollTop = 0;
    document.body.style.overflow = 'hidden'; // lock body behind
    setTimeout(() => {
      invitation.style.height = 'auto';
      document.body.style.overflow = 'auto'; // allow scroll
    }, 100);
  });
</script>

</body>
</html>
