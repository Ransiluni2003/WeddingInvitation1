<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f6fbf4;
    --gold: #2e6417;
    --gold-light: #5a9b3c;
    --gold-dark: #1f4a10;
    --brown: #3a4a2a;
    --text: #1e2a1a;
    --accent: #c9a84c;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  html, body { height: 100%; font-family: "Lato", sans-serif; -webkit-text-size-adjust: 100%; }
  body { background: #000; overflow: hidden; overscroll-behavior: none; }

  /* ===== VIDEO SCREEN ===== */
  #video-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    transition: opacity 1s ease, transform 1.2s ease;
  }
  #video-screen.hide { opacity: 0; transform: scale(1.06); pointer-events: none; }

  #bg-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .video-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.1) 0%,
      rgba(0,0,0,0.05) 35%,
      rgba(0,0,0,0.5) 70%,
      rgba(0,0,0,0.78) 100%);
    z-index: 1;
  }

  .tap-btn-wrap {
    position: relative; z-index: 2;
    margin-bottom: calc(clamp(3rem, 8vw, 6rem) + var(--safe-bottom));
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    animation: fadeUp 1.2s ease 1.6s both;
  }
  .tap-btn {
    position: relative; padding: 1.1rem 3.5rem;
    background: transparent; border: 1px solid rgba(232,204,128,0.7); color: #fff;
    font-family: "Cinzel", serif; font-size: clamp(0.75rem, 2vw, 0.95rem);
    letter-spacing: 0.35em; text-transform: uppercase; cursor: pointer; border-radius: 2px;
    overflow: hidden; transition: border-color 0.3s, background 0.3s;
    -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  }
  .tap-btn::before {
    content: ""; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.4));
    opacity: 0; transition: opacity 0.3s;
  }
  .tap-btn:hover::before, .tap-btn:active::before { opacity: 1; }
  .tap-btn:hover, .tap-btn:active { border-color: rgba(232,204,128,1); }

  .tap-ring { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(201,168,76,0.45); border-radius: 2px; animation: ringPulse 2.2s ease-out infinite; pointer-events: none; }
  .tap-ring:nth-child(2) { animation-delay: 0.7s; }
  .tap-ring:nth-child(3) { animation-delay: 1.4s; }
  @keyframes ringPulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.65); opacity: 0; } }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  /* ===== INVITATION SCROLLABLE ===== */
  #invitation-wrapper {
    position: fixed; inset: 0; overflow: hidden; z-index: 50; pointer-events: none;
  }
  #invitation-wrapper.show { pointer-events: all; }

  #invitation {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    overflow-y: scroll; -webkit-overflow-scrolling: touch;
    background: var(--cream); opacity: 0; transform: translateY(40px);
    transition: opacity 1s ease, transform 1s ease;
    padding-bottom: calc(var(--safe-bottom));
  }
  #invitation.show { opacity: 1; transform: translateY(0); }

  .inv-page { min-height: 100%; max-width: 900px; margin: 0 auto; padding: clamp(2rem, 6vw, 5rem) clamp(1.25rem, 4vw, 4rem); position: relative; }

  /* CORNERS */
  .corner { position: absolute; width: 60px; height: 60px; z-index: 1; pointer-events: none; }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 16px; left: 16px; }
  .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner.br { bottom: 16px; right: 16px; transform: scale(-1); }

  /* INVITATION CONTENT */
  .inv-content { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0; }
  .inv-logo { width: clamp(120px, 18vw, 180px); margin-bottom: 0.8rem; }
  .inv-tag { font-family: "Lato", sans-serif; font-weight: 300; font-size: clamp(0.65rem, 1.5vw, 0.78rem); letter-spacing: 0.35em; color: var(--gold); margin-bottom: 1.2rem; }
  .inv-together { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: clamp(1rem, 2.5vw, 1.25rem); color: var(--brown); font-weight: 300; letter-spacing: 0.08em; }
  .inv-names { font-family: "Cinzel", serif; font-size: clamp(2.6rem, 8vw, 5.5rem); font-weight: 400; color: var(--text); line-height: 1; margin: 0.4rem 0; }
  .inv-names .ampersand { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 0.7em; color: var(--gold); display: block; margin: -0.1em 0; }
  .ornament-line { display: flex; align-items: center; gap: 1rem; width: 100%; max-width: 400px; margin: 1.5rem auto; }
  .ornament-line hr { flex: 1; border: none; border-top: 1px solid var(--gold-light); }
  .ornament-line span { color: var(--gold); font-size: 1.1rem; }
  .inv-request { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: clamp(0.9rem, 2.2vw, 1.15rem); color: var(--brown); line-height: 1.8; max-width: 420px; }

  .inv-date-block { margin: 2.5rem 0 2rem; }
  .inv-date { font-family: "Cinzel", serif; font-size: clamp(1.4rem, 4vw, 2.2rem); color: var(--text); letter-spacing: 0.15em; }

  .rsvp-section { margin-top: 2.5rem; width: 100%; max-width: 420px; }
  .rsvp-title { font-family: "Cinzel", serif; font-size: clamp(0.9rem, 2vw, 1.1rem); letter-spacing: 0.3em; color: var(--gold-dark); margin-bottom: 1.2rem; }
  .rsvp-note { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: clamp(0.85rem, 2vw, 1rem); color: var(--brown); margin-bottom: 1.2rem; line-height: 1.6; }
  .rsvp-btn { display: inline-block; padding: 0.85rem 2.5rem; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: white; font-family: "Cinzel", serif; font-size: 0.8rem; letter-spacing: 0.25em; text-transform: uppercase; border-radius: 2px; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(160,100,0,0.3); }

  /* ===== MUSIC BUTTON ===== */
  #music-widget { position: fixed; bottom: calc(24px + var(--safe-bottom)); right: 24px; z-index: 9999; display: flex; flex-direction: column; align-items: flex-end; gap: 0; }
  #musicBtn { position: relative; width: 56px; height: 56px; border-radius: 50%; border: none; cursor: pointer; background: linear-gradient(145deg, #2e6417, #1f4a10); display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
</style>
</head>
<body>

<!-- VIDEO SCREEN -->
<div id="video-screen">
  <video id="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="0312.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>
  <div class="tap-btn-wrap">
    <button class="tap-btn" id="tapBtn">
      <div class="tap-ring"></div>
      <div class="tap-ring"></div>
      <div class="tap-ring"></div>
      ✦ &nbsp;Tap to Open
    </button>
  </div>
</div>

<!-- INVITATION -->
<div id="invitation-wrapper">
  <div id="invitation">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="inv-page">
      <div class="inv-content">
        <img class="inv-logo" src="logoCV-removebg-preview.png" alt="Logo">
        <p class="inv-tag">Together with their families</p>
        <p class="inv-together">invite you to celebrate the marriage of</p>
        <div class="inv-names">Chamith<span class="ampersand">&</span>Vihanga</div>
        <div class="ornament-line"><hr><span>✦</span><hr></div>
        <p class="inv-request">Together with joyful hearts,<br>we joyfully invite you to share in the beginning of our forever.</p>
        <div class="inv-date-block"><div class="inv-date">Thursday 07 May 2026</div></div>
        <div class="rsvp-section">
          <div class="ornament-line"><hr><span>✦</span><hr></div>
          <p class="rsvp-title">RSVP</p>
          <p class="rsvp-note">Kindly reply by April 1st, 2026<br>We hope to celebrate with you.</p>
          <button class="rsvp-btn"
            onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSd13_FD8OMV4lR2Pg3nxUk5WnogaZ_Jq45oASq60Ir6B_UrjA/viewform','_blank')">
            RSVP Now
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MUSIC WIDGET -->
<div id="music-widget">
  <button id="musicBtn">
    <div class="music-bars"><span></span><span></span><span></span><span></span></div>
  </button>
</div>

<script>
  // OPEN INVITATION
  const tapBtn = document.getElementById('tapBtn');
  const videoScreen = document.getElementById('video-screen');
  const invitationWrapper = document.getElementById('invitation-wrapper');
  const invitation = document.getElementById('invitation');

  tapBtn.addEventListener('click', () => {
    videoScreen.classList.add('hide');
    invitationWrapper.classList.add('show');
    invitation.classList.add('show');
    document.body.style.overflow = 'auto'; // allow scrolling
  });
</script>

</body>
</html>
