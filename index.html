<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wedding Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f6fbf4;
    --gold: #2e6417;
    --gold-light: #5a9b3c;
    --gold-dark: #1f4a10;
    --brown: #3a4a2a;
    --text: #1e2a1a;
    --accent: #c9a84c;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  html, body {
    width: 100%;
    font-family: "Lato", sans-serif;
    background: #000;
    overflow-x: hidden;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
  }

  /* ===== VIDEO SCREEN ===== */
  #video-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
    transition: opacity 1s ease, transform 1.2s ease;
  }
  #video-screen.hide {
    opacity: 0; transform: scale(1.06); pointer-events: none; visibility: hidden; z-index: -1;
  }

  #bg-video {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover; z-index: 0;
  }

  .video-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.05) 35%, rgba(0,0,0,0.5) 70%, rgba(0,0,0,0.78) 100%);
    z-index: 1;
  }

  .video-title {
    position: absolute; top: 42%; left: 50%;
    transform: translate(-50%, -50%); z-index: 2; text-align: center;
    animation: fadeUp 1.4s ease 0.8s both; width: 90%;
  }
  .video-title-names { font-family: "Cinzel", serif; font-size: clamp(2.2rem, 8vw, 5.5rem); color: #fff; }

  .tap-btn-wrap {
    position: relative; z-index: 2;
    margin-bottom: calc(clamp(3rem, 8vw, 6rem) + var(--safe-bottom));
    display: flex; flex-direction: column; align-items: center; gap: 1rem;
    animation: fadeUp 1.2s ease 1.6s both;
  }
  .tap-btn {
    position: relative; padding: 1.1rem 3.5rem;
    background: transparent; border: 1px solid rgba(232,204,128,0.7);
    color: #fff; font-family: "Cinzel", serif; font-size: clamp(0.75rem, 2vw, 0.95rem);
    letter-spacing: 0.35em; text-transform: uppercase; cursor: pointer; border-radius: 2px; overflow: hidden;
  }

  /* ===== INVITATION PAGE ===== */
  #invitation {
    position: absolute; top: 0; left: 0; right: 0;
    width: 100%;
    min-height: 100vh;
    z-index: 50;
    background: var(--cream);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overflow-x: hidden;
    opacity: 0;
    pointer-events: none;
    transform: translateY(40px);
    transition: opacity 1s ease 0.2s, transform 1s ease 0.2s;
  }
  #invitation.show {
    opacity: 1;
    pointer-events: all;
    transform: translateY(0);
    padding-bottom: calc(3rem + var(--safe-bottom));
  }

  .inv-page {
    width: 100%;
    min-height: 100vh;
    max-width: min(900px, 92vw);
    margin: 0 auto;
    padding: clamp(2rem, 6vw, 5rem) clamp(1.25rem, 4vw, 4rem);
    position: relative;
  }

  .inv-content { text-align: center; display: flex; flex-direction: column; gap: 1rem; align-items: center; }

  .inv-logo { width: clamp(120px, 18vw, 180px); height: auto; }
  .inv-tag, .inv-together { color: var(--gold); }
  .inv-names { font-family: "Cinzel", serif; font-size: clamp(2.6rem, 8vw, 5.5rem); color: var(--text); }
  .ampersand { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 0.7em; color: var(--gold); display: block; margin: -0.1em 0; }

  .rsvp-btn { cursor: pointer; padding: 0.85rem 2.5rem; background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: #fff; border-radius: 2px; border: none; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

</style>
</head>
<body>

<!-- VIDEO SCREEN -->
<div id="video-screen">
  <video id="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="0312.mp4" type="video/mp4">
  </video>
  <div class="video-overlay"></div>

  <div class="tap-btn-wrap">
    <button class="tap-btn" id="tapBtn">
      ✦ &nbsp;Tap to Open
    </button>
  </div>
</div>

<!-- INVITATION PAGE -->
<div id="invitation">
  <div class="inv-page">
    <div class="inv-content">
      <img class="inv-logo" src="logoCV-removebg-preview.png" alt="Chamith and Vihanga logo" />
      <p class="inv-tag">Together with their families</p>
      <p class="inv-together">invite you to celebrate the marriage of</p>
      <div class="inv-names">
        Chamith <span class="ampersand">&</span> Vihanga
      </div>
      <p class="rsvp-note">
        Kindly reply by April 1st, 2026<br>
        We hope to celebrate with you.
      </p>
      <button class="rsvp-btn"
        onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSd13_FD8OMV4lR2Pg3nxUk5WnogaZ_Jq45oASq60Ir6B_UrjA/viewform','_blank')">
        RSVP Now
      </button>
      <p style="margin-top: 50vh;">Scroll test: you can now scroll on iPhone ✅</p>
    </div>
  </div>
</div>

<script>
  const tapBtn = document.getElementById('tapBtn');
  const videoScreen = document.getElementById('video-screen');
  const invitation = document.getElementById('invitation');

  tapBtn.addEventListener('click', () => {
    videoScreen.classList.add('hide');
    invitation.classList.add('show');
    // Remove video screen from DOM flow after animation
    setTimeout(() => {
      videoScreen.style.display = 'none';
    }, 1200);
  });
</script>

</body>
</html>
